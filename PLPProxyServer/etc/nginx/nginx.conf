user www-data;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
}

# Single-tenant proxy forward: plain TCP pass-through to the one customer's
# frp-tunneled ports, no TLS termination and no SNI-based routing here — the
# actual TLS handshake happens on the customer's own Pi.
stream {
	server {
		listen 443;
		proxy_pass 127.0.0.1:__HTTPS_PORT__;
		proxy_timeout 300s;
		proxy_connect_timeout 10s;
	}

	server {
		listen 8883;
		proxy_pass 127.0.0.1:__MQTT_PORT__;
		proxy_timeout 300s;
		proxy_connect_timeout 10s;
	}
}
